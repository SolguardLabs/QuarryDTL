name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
      - name: Install dependencies
        run: npm install
      - name: Run CI
        run: bash scripts/ci.sh
